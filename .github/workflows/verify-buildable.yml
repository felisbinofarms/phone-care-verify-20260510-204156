name: Verify Code is Buildable

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  verify-buildable:
    runs-on: macos-15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build (device SDK, no signing)
        id: build
        run: |
          set -eo pipefail
          xcodebuild build \
            -project PhoneCare.xcodeproj \
            -scheme PhoneCare \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Mark failure
        if: failure() && steps.build.conclusion == 'failure'
        run: echo "status=failure" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildResult = "${{ steps.build.outputs.status }}";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body;
            if (buildResult === 'success') {
              body = `✅ **Build Verification Passed**\n\nThis branch compiles cleanly for \`iphoneos\` with no code signing.\n\n[View build logs](${runUrl})`;
            } else {
              body = `❌ **Build Verification Failed**\n\nThis branch does not compile. Fix the errors before merging.\n\n[View build logs](${runUrl})`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
